<!DOCTYPE html>
<html lang="en">

<head>
    <title>My Personal Portfolio</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }


        body{
            min-height:100vh;
            background:linear-gradient(135deg,#bda6d4,#7f9cce);
        }


        /* Navigation Bar */

        .navbar{
            height:80px;
            display:flex;
            justify-content:center;
            align-items:center;
            gap:70px;
            background:linear-gradient(90deg,#654ea3,#eaafc8);
            box-shadow:0 4px 10px rgba(0,0,0,0.2);
        }


        .navbar a{
            text-decoration:none;
            color:#272139;
            font-size:20px;
            font-weight:bold;
            transition:0.3s;
        }


        .navbar a:hover{
            color:white;
            transform:translateY(-3px);
        }



        /* Home Section */

        .home{
            display:flex;
            align-items:center;
            justify-content:center;
            gap:150px;
            padding-top:120px;
        }


        /* Profile Image */

        .profile img{

            width:260px;
            height:260px;
            border-radius:50%;
            object-fit:cover;
            border:6px solid white;
            box-shadow:0 8px 20px rgba(0,0,0,0.3);

        }



        /* Introduction */

        .intro{

            color:#2e2934;
            font-family:cursive;

        }


        .intro h1{

            font-size:45px;
            margin-bottom:15px;

        }


        .intro h3{

            font-size:25px;
            color:#4b385f;

        }


    </style>

</head>


<body>


    <div class="navbar">

        <a href="Portfolio.html">HOME</a>
        <a href="Aboutus.html">ABOUT US</a>
        <a href="skills.html">SKILLS</a>
        <a href="Hobbies.html">HOBBIES</a>
        <a href="Education.html">EDUCATION</a>
        <a href="#">CONTACT</a>

    </div>



    <div class="home">


        <div class="profile">

            <img src="keerthika.jpeg" alt="keerthika">

        </div>



        <div class="intro">

            <h1>I'm Keerthika</h1>

            <h3>Full Stack Web Developer</h3>

        </div>


    </div>


</body>

</html>
