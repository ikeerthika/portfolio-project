<!DOCTYPE html>
<html lang="en">

<head>

<title>Contact</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}


body{

    min-height:100vh;
    background:linear-gradient(135deg,#bda6d4,#7f9cce);

}



/* Navbar */

.navbar{

    height:70px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:70px;
    background:linear-gradient(90deg,#654ea3,#eaafc8);
    box-shadow:0 4px 10px rgba(0,0,0,0.2);

}


.navbar a{

    text-decoration:none;
    color:#272139;
    font-size:18px;
    font-weight:bold;
    transition:0.3s;

}


.navbar a:hover{

    color:white;
    transform:translateY(-3px);

}




/* Contact Box */

.container{

    display:flex;
    justify-content:center;
    align-items:center;
    padding-top:80px;

}



.contact-box{

    width:500px;
    background:white;
    padding:40px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
    transition:0.3s;

}



.contact-box:hover{

    transform:translateY(-8px);

}



h1{

    font-size:45px;
    color:#5a189a;
    font-family:cursive;
    margin-bottom:30px;

}



.info{

    background:#f3e8ff;
    padding:18px;
    margin:15px 0;
    border-radius:15px;
    font-size:18px;
    color:#3c096c;
    transition:0.3s;

}



.info:hover{

    background:#9c66b1;
    color:white;

}



a{

    color:#5a189a;
    text-decoration:none;
    font-weight:bold;

}



.info:hover a{

    color:white;

}




@media(max-width:768px){

    .navbar{

        gap:20px;
        flex-wrap:wrap;

    }


    .contact-box{

        width:90%;

    }

}


</style>

</head>
